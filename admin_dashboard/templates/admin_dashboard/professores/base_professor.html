<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Professor{% endblock %} - BAILAH</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="header">
        <h1>BAILAH - Área do Professor</h1>
        <div class="header-user">
            <span>{{ request.user.first_name }}</span>
            <a href="{% url 'logout' %}" class="btn-logout">Sair</a>
        </div>
    </div>
    <div class="container">
        <aside class="sidebar">
            <nav>
                <a href="{% url 'admin_dashboard:professor_dashboard' %}">Dashboard</a>
                <a href="{% url 'admin_dashboard:professor_avisos' %}">Avisos</a>
                <a href="{% url 'logout' %}">Sair</a>
            </nav>
        </aside>
        <main class="content">
            {% if messages %}
                <div class="messages">
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
