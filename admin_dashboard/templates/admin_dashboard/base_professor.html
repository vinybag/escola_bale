<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Professor{% endblock %} - BAILAH</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .header {
            background: linear-gradient(135deg, #2c3e50, #b07a84);
            color: white;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar {
            width: 260px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            padding: 2rem 0;
            min-height: calc(100vh - 70px);
        }
        .sidebar a {
            display: block;
            padding: 1rem 2rem;
            color: #333;
            text-decoration: none;
            border-left: 3px solid transparent;
        }
        .sidebar a:hover {
            background: #f5f5f5;
            border-left-color: #b07a84;
        }
        .sidebar a.active {
            background: #faf8f9;
            border-left-color: #b07a84;
            color: #b07a84;
            font-weight: 600;
        }
        .content {
            flex: 1;
            padding: 1.5rem;
        }
        .container {
            display: flex;
        }
        .btn-logout {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            text-decoration: none;
        }
        .alert {
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 1rem;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
        }
        .alert-error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>BAILAH - Área do Professor</h1>
        <div class="header-user">
            <span>{{ request.user.first_name }}</span>
            <a href="{% url 'logout' %}" class="btn-logout">Sair</a>
        </div>
    </div>
    <div class="container">
        <aside class="sidebar">
            <nav>
                <a href="{% url 'admin_dashboard:professor_dashboard' %}">Dashboard</a>
                <a href="{% url 'admin_dashboard:professor_avisos' %}">Avisos</a>
                <a href="{% url 'logout' %}">Sair</a>
            </nav>
        </aside>
        <main class="content">
            {% if messages %}
                <div class="messages">
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
