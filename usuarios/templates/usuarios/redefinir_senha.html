{% extends 'base.html' %}

{% block title %}Redefinir senha - BAILAH{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 4rem auto; padding: 2rem;">
    <div style="background: white; padding: 3rem 2rem; border-radius: 15px; box-shadow: 0 2px 20px rgba(0,0,0,0.1);">
        
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2 style="color: #2c3e50; margin-bottom: 0.5rem;">Nova senha</h2>
            <p style="color: #666;">{{ email }}</p>
        </div>
        
        {% if messages %}
            {% for message in messages %}
                <div style="background: {% if message.tags == 'success' %}#d4edda{% else %}#f8d7da{% endif %}; 
                            color: {% if message.tags == 'success' %}#155724{% else %}#721c24{% endif %}; 
                            padding: 1rem; border-radius: 5px; margin-bottom: 1.5rem; 
                            border-left: 4px solid {% if message.tags == 'success' %}#28a745{% else %}#dc3545{% endif %};">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: #333;">
                    Nova senha
                </label>
                <input type="password" 
                       name="nova_senha" 
                       required
                       minlength="6"
                       placeholder="Mínimo 6 caracteres"
                       style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem;">
            </div>
            
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: #333;">
                    Confirmar senha
                </label>
                <input type="password" 
                       name="confirma_senha" 
                       required
                       minlength="6"
                       placeholder="Digite a senha novamente"
                       style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem;">
            </div>
            
            <button type="submit" 
                    style="width: 100%; padding: 0.75rem; background: linear-gradient(135deg, #2c3e50, #b07a84); color: white; border: none; border-radius: 5px; font-size: 1rem; font-weight: 600; cursor: pointer;">
                Redefinir senha
            </button>
        </form>
        
    </div>
</div>
{% endblock %}
