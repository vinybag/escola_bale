<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BKN Tech - Ballet{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f5f5f5;
        }
        
        .header-public {
            background: linear-gradient(135deg, #2c3e50, #b07a84);
            color: white;
            padding: 1rem;
            text-align: center;
        }
        
        .header-public h1 {
            font-size: 1.5rem;
        }
        
        .nav-public {
            background: white;
            padding: 0.75rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .nav-public a {
            color: #2c3e50;
            text-decoration: none;
            margin: 0 1rem;
            padding: 0.5rem;
        }
        
        .nav-public a:hover {
            color: #b07a84;
        }
        
        .content {
            min-height: calc(100vh - 180px);
            padding: 2rem;
        }
        
        .footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 1rem;
            font-size: 0.875rem;
        }
        
        @media (max-width: 768px) {
            .nav-public a {
                display: inline-block;
                margin: 0.25rem;
            }
            .content {
                padding: 1rem;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    
    <div class="header-public">
        <h1>BKN Tech - Escola de Ballet</h1>
    </div>
    
    <div class="nav-public">
        <a href="/">Início</a>
        <a href="/espetaculos/">Espetáculos</a>
    </div>
    
    <div class="content">
        {% block content %}{% endblock %}
    </div>
    
    <div class="footer">
        <p>&copy; 2025 BKN Tech - Escola de Ballet. Todos os direitos reservados.</p>
    </div>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
