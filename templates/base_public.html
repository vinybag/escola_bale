<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>{% block title %}BAILAH - Corpo e Cia{% endblock %}</title>
    {% load static %}
    
    <link rel="icon" type="image/png" href="{% static 'favicon.png' %}">
    <link rel="shortcut icon" type="image/png" href="{% static 'favicon.png' %}">
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        /* Apenas ajustes responsivos - sem mudar cores */
        @media (max-width: 768px) {
            .navbar .container {
                flex-direction: column;
                gap: 0.25rem;
                padding: 0.5rem;
            }
            
            .logo img {
                max-height: 35px;
            }
            
            .nav-links {
                justify-content: center;
                gap: 0.2rem;
            }
            
            .nav-links li a {
                padding: 0.3rem 0.4rem;
                font-size: 0.7rem;
            }
        }
        
        @media (max-width: 480px) {
            .nav-links li a {
                font-size: 0.65rem;
                padding: 0.25rem 0.35rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">
                <img src="{% static 'img/logo.png' %}" alt="BAILAH - Corpo e Cia">
            </a>
            <ul class="nav-links">
                <li><a href="/">Início</a></li>
                <li><a href="/espetaculos/">Espetáculos</a></li>
                <li><a href="/agenda/experimental/">Aula Experimental</a></li>
                <li><a href="/conta/login/" class="btn-login">Área dos Pais</a></li>
            </ul>
        </div>
    </nav>

    <main>
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 BAILAH - Corpo e Cia - Todos os direitos reservados</p>
    </footer>
</body>
</html>
